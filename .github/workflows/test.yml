name: Run Tests

on:
   pull_request:
   push:
     branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-tests:
    name: python (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --dev

      - name: Run Type Checker
        if: matrix.shard == 1
        run: uv run ty check src/ tests/

      # To debug snapshot test failures run with --debug-visual-save and download the artifact zip created in the next step.
      - name: Run tests with coverage
        env:
          SPLITS: ${{ strategy.job-total }}
          GROUP: ${{ matrix.shard }}
        run: uv run pytest tests --cov=src/xpublish_tiles --cov-report=xml --cov-report=term-missing --durations=10 -nauto --splits="$SPLITS" --group="$GROUP" --splitting-algorithm=least_duration

      - name: Upload debug visual images on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debug-visual-images-shard-${{ matrix.shard }}
          path: debug_visual_diff_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Install only the base dependencies, no extras, and ensure the CLI can still be imported
  # Intended to reproduce <https://github.com/earth-mover/xpublish-tiles/issues/179>
  test-import-with-base-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Install package without optional deps
        run: |
          uv venv
          uv pip install .

      - name: Test CLI entry point doesn't crash
        run: |
          # without the `--no-project` flag, development dependencies are installed and invalidate the test!
          uv run --no-project python -c "from xpublish_tiles.cli.main import main"
          uv run --no-project python -c "import xpublish_tiles"
          uv run --no-project python -c "from xpublish_tiles.xpublish.tiles import TilesPlugin"
          uv run --no-project python -c "from xpublish_tiles.xpublish.wms import WMSPlugin"
          uv run --no-project xpublish-tiles --help
